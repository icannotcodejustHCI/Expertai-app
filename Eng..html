<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download UpToDate Expert AI</title>
  <style>
    :root {
      --wk-blue: #007ac3;
      --ink: #1a2b3c;
      --muted: #5a6b7b;
      --line: #e2e8ef;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background: #f7f9fb;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(26, 43, 60, 0.06);
    }
    .bar {
      width: 44px;
      height: 4px;
      background: var(--wk-blue);
      border-radius: 4px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 10px;
    }
    p.sub {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 28px;
    }
    .btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a.store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #fff;
      transition: border-color .15s, transform .05s;
    }
    a.store:hover { border-color: var(--wk-blue); }
    a.store:active { transform: scale(.99); }
    a.store svg { width: 22px; height: 22px; flex-shrink: 0; }
    .hint {
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="bar"></div>
      <h1>UpToDate Expert AI Mobile App</h1>
      <p class="sub">On rounds, in conference, anywhere.<br>Clinical AI you can trust, whenever you need it.</p>
      <div class="btns">
        <a class="store" id="ios" href="https://apps.apple.com/app/id6756627759">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 12.54c-.02-2.06 1.68-3.05 1.76-3.1-0.96-1.4-2.45-1.6-2.98-1.62-1.27-.13-2.48.75-3.12.75-.65 0-1.63-.73-2.68-.71-1.38.02-2.65.8-3.36 2.03-1.43 2.48-.37 6.15 1.03 8.16.68.98 1.5 2.08 2.56 2.04 1.03-.04 1.42-.66 2.66-.66 1.24 0 1.59.66 2.68.64 1.11-.02 1.81-1 2.49-1.99.78-1.14 1.11-2.24 1.13-2.3-.02-.01-2.17-.83-2.19-3.29zM15.1 6.13c.56-.68.94-1.63.84-2.57-.81.03-1.79.54-2.37 1.22-.52.6-.97 1.56-.85 2.48.9.07 1.82-.46 2.38-1.13z"/></svg>
          Download on the App Store
        </a>
        <a class="store" id="android" href="https://play.google.com/store/apps/details?id=com.uptodate.expertai">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 20.5c.1.1.2.1.3.1.1 0 .3 0 .4-.1l9.1-5.2-2.5-2.5-7.3 7.3v.4zm-.4-16.6v16.2c0 .2 0 .3.1.5L11.6 12 3.3 3.7c-.1.1-.1.2-.1.2zm14.4 6.3l-2.6-1.5-2.9 2.8 2.9 2.8 2.6-1.5c.9-.5.9-1.6 0-2.1v-.5zM4.3 3.4c-.1 0-.2 0-.3.1l9.6 5.5 2.5-2.5L4.7 3.4c-.1 0-.3-.1-.4 0z"/></svg>
          Get it on Google Play
        </a>
      </div>
      <p class="hint">If you're not redirected automatically, tap a button above.</p>
    </div>
  </div>

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var iosUrl = document.getElementById('ios').href;
      var androidUrl = document.getElementById('android').href;

      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var isAndroid = /android/i.test(ua);

      if (isIOS) {
        window.location.replace(iosUrl);
      } else if (isAndroid) {
        window.location.replace(androidUrl);
      }
    })();
  </script>
</body>
</html>
